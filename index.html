<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ງົບປະຈຳວັນ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F2027;
    --bg-2: #16323E;
    --card: #1B3A46;
    --card-2: #204450;
    --gold: #E8B94A;
    --gold-dim: #B8933A;
    --green: #4CAF7D;
    --yellow: #E8B94A;
    --red: #E0654B;
    --text: #F4EFE3;
    --text-dim: #A9C0C4;
    --border: #2C5060;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Lao', sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  body{
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }
  header{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 20px;
  }
  header h1{ font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
  header .date{ font-size: 13px; color: var(--text-dim); }
  .gear{
    width:38px; height:38px; border-radius:50%;
    background: var(--card); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:18px; cursor:pointer; color: var(--text-dim);
  }

  .budget-card{
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    text-align:center;
    margin-bottom: 16px;
  }
  .budget-label{ font-size:13px; color: var(--text-dim); margin-bottom:6px; }
  .budget-remaining{ font-size: 40px; font-weight:700; color: var(--gold); line-height:1.1; }
  .budget-sub{ font-size:13px; color: var(--text-dim); margin-top:6px; }
  .bar-track{
    height:10px; background: rgba(255,255,255,0.08); border-radius:6px;
    margin-top:16px; overflow:hidden;
  }
  .bar-fill{
    height:100%; border-radius:6px; transition: width 0.4s ease;
    background: var(--green);
  }
  .bar-fill.warn{ background: var(--yellow); }
  .bar-fill.over{ background: var(--red); }

  .alert-banner{
    display:none;
    align-items:center; gap:10px;
    padding:14px 16px; border-radius:14px; margin-bottom:16px;
    font-size:14px; font-weight:600;
  }
  .alert-banner.show{ display:flex; }
  .alert-banner.warn{ background: rgba(232,185,74,0.18); border:1px solid var(--yellow); color: var(--yellow); }
  .alert-banner.over{ background: rgba(224,101,75,0.18); border:1px solid var(--red); color: #F4A896; }
  .alert-banner .ic{ font-size:20px; }

  .row-cards{ display:flex; gap:12px; margin-bottom:16px; }
  .mini-card{
    flex:1; background: var(--card); border:1px solid var(--border);
    border-radius: 16px; padding: 14px; text-align:center;
  }
  .mini-card .v{ font-size:18px; font-weight:600; }
  .mini-card .l{ font-size:12px; color: var(--text-dim); margin-top:2px; }

  .section-title{ font-size:14px; color: var(--text-dim); margin: 20px 0 10px; }

  .grid-btns{ display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
  .cat-btn{
    background: var(--card); border:1px solid var(--border);
    border-radius: 14px; padding: 14px 6px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    cursor:pointer; color: var(--text); font-size:12px;
  }
  .cat-btn .ic{ font-size:20px; }
  .cat-btn:active{ background: var(--card-2); }

  .action-row{ display:flex; gap:12px; margin-top:16px; }
  .btn{
    flex:1; padding:14px; border-radius:14px; border:none;
    font-size:15px; font-weight:600; cursor:pointer;
    font-family: inherit;
  }
  .btn-income{ background: var(--green); color:#0F2027; }
  .btn-saving{ background: var(--gold); color:#0F2027; }

  .history-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 4px; border-bottom:1px solid var(--border);
    font-size:14px;
  }
  .history-item .cat{ color: var(--text); }
  .history-item .time{ color: var(--text-dim); font-size:12px; margin-left:8px;}
  .history-item .amt{ color: var(--red); font-weight:600; }
  .empty-hint{ color: var(--text-dim); font-size:13px; text-align:center; padding:20px 0; }

  .chart-wrap{
    background: var(--card); border:1px solid var(--border);
    border-radius:16px; padding:16px;
  }
  .chart-row{ display:flex; align-items:flex-end; gap:8px; height:100px; }
  .chart-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .chart-bar{ width:100%; background: var(--gold-dim); border-radius:4px 4px 0 0; min-height:2px; }
  .chart-day{ font-size:10px; color: var(--text-dim); }

  /* modal */
  .overlay{
    position:fixed; inset:0; background: rgba(0,0,0,0.55);
    display:none; align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.show{ display:flex; }
  .sheet{
    background: var(--bg-2); width:100%; max-width:480px;
    border-radius: 20px 20px 0 0; padding: 22px 20px 30px;
    border-top: 1px solid var(--border);
  }
  .sheet h2{ font-size:17px; font-weight:600; margin-bottom:16px; }
  .sheet input, .sheet select{
    width:100%; padding:14px; border-radius:12px; border:1px solid var(--border);
    background: var(--card); color: var(--text); font-size:16px; margin-bottom:12px;
    font-family:inherit;
  }
  .sheet label{ font-size:13px; color:var(--text-dim); display:block; margin-bottom:6px; }
  .sheet-btns{ display:flex; gap:10px; margin-top:6px; }
  .sheet-btns button{ flex:1; padding:14px; border-radius:12px; border:none; font-size:15px; font-weight:600; font-family:inherit; }
  .cancel-btn{ background: var(--card); color: var(--text-dim); }
  .confirm-btn{ background: var(--gold); color:#0F2027; }

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background: var(--card-2); color:var(--text); padding:12px 20px;
    border-radius:12px; font-size:14px; opacity:0; transition:opacity 0.3s;
    z-index:100; border:1px solid var(--border);
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<header>
  <div>
    <h1>ງົບປະຈຳວັນ</h1>
    <div class="date" id="todayDate"></div>
  </div>
  <div class="gear" id="settingsBtn">⚙</div>
</header>

<div class="alert-banner" id="alertBanner">
  <span class="ic" id="alertIcon">⚠️</span>
  <span id="alertText"></span>
</div>

<div class="budget-card">
  <div class="budget-label">ເຫຼືອໃຊ້ຈ່າຍມື້ນີ້</div>
  <div class="budget-remaining" id="remainingAmt">-</div>
  <div class="budget-sub" id="budgetSub">ກຳລັງໂຫຼດ...</div>
  <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
</div>

<div class="row-cards">
  <div class="mini-card">
    <div class="v" id="savingsAmt">-</div>
    <div class="l" id="savingsLabel">ເງິນເກັບລວມ</div>
  </div>
  <div class="mini-card">
    <div class="v" id="todayIncomeAmt">-</div>
    <div class="l">ລາຍຮັບມື້ນີ້</div>
  </div>
</div>

<div class="section-title">ບັນທຶກລາຍຈ່າຍໄວ</div>
<div class="grid-btns" id="catGrid">
  <div class="cat-btn" data-cat="ອາຫານ"><span class="ic">🍜</span>ອາຫານ</div>
  <div class="cat-btn" data-cat="ນ້ຳມັນ"><span class="ic">⛽</span>ນ້ຳມັນ</div>
  <div class="cat-btn" data-cat="ຮ້ານ"><span class="ic">🛒</span>ຮ້ານ</div>
  <div class="cat-btn" data-cat="ອື່ນໆ"><span class="ic">➕</span>ອື່ນໆ</div>
</div>

<div class="action-row">
  <button class="btn btn-income" id="addIncomeBtn">+ ລາຍຮັບ</button>
  <button class="btn btn-saving" id="addSavingBtn">+ ເງິນເກັບ</button>
</div>

<div class="section-title">7 ມື້ຍ້ອນຫຼັງ</div>
<div class="chart-wrap">
  <div class="chart-row" id="chartRow"></div>
</div>

<div class="section-title">ລາຍການມື້ນີ້</div>
<div id="historyList"></div>

<!-- Modal: quick amount entry -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h2 id="sheetTitle">ບັນທຶກລາຍຈ່າຍ</h2>
    <label>ຈຳນວນເງິນ (ກີບ)</label>
    <input type="number" id="amountInput" placeholder="0" inputmode="numeric">
    <label>ໝາຍເຫດ (ຖ້າມີ)</label>
    <input type="text" id="noteInput" placeholder="ບໍ່ບັງຄັບ">
    <div class="sheet-btns">
      <button class="cancel-btn" id="cancelBtn">ຍົກເລີກ</button>
      <button class="confirm-btn" id="confirmBtn">ບັນທຶກ</button>
    </div>
  </div>
</div>

<!-- Modal: settings -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <h2>ຕັ້ງຄ່າ</h2>
    <label>Apps Script Web App URL</label>
    <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="sheet-btns">
      <button class="cancel-btn" id="settingsCancelBtn">ຍົກເລີກ</button>
      <button class="confirm-btn" id="settingsSaveBtn">ບັນທຶກ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LAO_DAYS = ['ອາ','ຈ','ອ','ພ','ພຫ','ສຸ','ສ'];
const LAO_MONTHS = ['ມ.ກ','ກ.ພ','ມີ.ນ','ມ.ສ','ພ.ພ','ມິ.ຖ','ກ.ລ','ສ.ຫ','ກ.ຍ','ຕ.ລ','ພ.ຈ','ທ.ວ'];

let API_URL = localStorage.getItem('budgetApiUrl') || '';
let pendingType = null; // 'expense' category or 'income' or 'saving'

const $ = (id) => document.getElementById(id);

function setDate(){
  const d = new Date();
  $('todayDate').textContent = LAO_DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + LAO_MONTHS[d.getMonth()] + ' ' + (d.getFullYear()+543);
}

function fmt(n){
  return Math.round(n).toLocaleString('en-US');
}

function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function apiGet(action, params={}){
  if(!API_URL){ showToast('ກະລຸນາຕັ້ງຄ່າ API URL ກ່ອນ (ກົດ ⚙)'); return null; }
  const qs = new URLSearchParams({action, ...params});
  const res = await fetch(API_URL + '?' + qs.toString());
  return res.json();
}

async function apiPost(body){
  if(!API_URL){ showToast('ກະລຸນາຕັ້ງຄ່າ API URL ກ່ອນ (ກົດ ⚙)'); return null; }
  const res = await fetch(API_URL, {
    method:'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

async function loadSummary(){
  const s = await apiGet('summary');
  if(!s || s.error) return;

  $('remainingAmt').textContent = fmt(Math.max(s.remaining,0)) + ' ກີບ';
  $('budgetSub').textContent = 'ໃຊ້ໄປ ' + fmt(s.todaySpent) + ' / ງົບ ' + fmt(s.dailyBudget) + ' ກີບ';
  $('savingsAmt').textContent = fmt(s.savingsTotal);
  $('savingsLabel').textContent = s.savingsGoalAmount > 0
    ? 'ເງິນເກັບ (' + s.savingsGoalPercent + '% ຂອງ' + (s.savingsGoalName||'ເປົ້າ') + ')'
    : 'ເງິນເກັບລວມ';
  $('todayIncomeAmt').textContent = fmt(s.todayIncome);

  const pct = Math.min(s.percentUsed, 100);
  const fill = $('barFill');
  fill.style.width = pct + '%';
  fill.className = 'bar-fill' + (s.percentUsed > 100 ? ' over' : s.percentUsed >= 80 ? ' warn' : '');

  const banner = $('alertBanner');
  if(s.percentUsed > 100){
    banner.className = 'alert-banner show over';
    $('alertIcon').textContent = '⚠️';
    $('alertText').textContent = 'ໃຊ້ຈ່າຍເກີນງົບແລ້ວ ' + fmt(s.todaySpent - s.dailyBudget) + ' ກີບ';
    document.title = '⚠️ ເກີນງົບ! ງົບປະຈຳວັນ';
  } else if(s.percentUsed >= 80){
    banner.className = 'alert-banner show warn';
    $('alertIcon').textContent = '🟡';
    $('alertText').textContent = 'ໃຊ້ໄປແລ້ວ ' + s.percentUsed + '% ຂອງງົບມື້ນີ້ ລະວັງໄວ້ເດີ້';
    document.title = 'ງົບປະຈຳວັນ';
  } else {
    banner.className = 'alert-banner';
    document.title = 'ງົບປະຈຳວັນ';
  }

  // history list
  const list = $('historyList');
  if(s.todayItems.length === 0){
    list.innerHTML = '<div class="empty-hint">ຍັງບໍ່ໄດ້ບັນທຶກຫຍັງມື້ນີ້</div>';
  } else {
    list.innerHTML = s.todayItems.slice().reverse().map(it => `
      <div class="history-item">
        <span class="cat">${it.label}${it.note ? ' · '+it.note : ''} <span class="time">${it.time}</span></span>
        <span class="amt">-${fmt(it.amount)}</span>
      </div>
    `).join('');
  }

  // chart
  const maxVal = Math.max(...s.history.map(h => Math.max(h.expense, h.income)), 1);
  $('chartRow').innerHTML = s.history.map(h => {
    const d = new Date(h.date);
    const heightPct = Math.max((h.expense / maxVal) * 100, 2);
    return `<div class="chart-col">
      <div class="chart-bar" style="height:${heightPct}%"></div>
      <div class="chart-day">${LAO_DAYS[d.getDay()]}</div>
    </div>`;
  }).join('');
}

// category quick-add
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    pendingType = { kind:'expense', category: btn.dataset.cat };
    $('sheetTitle').textContent = 'ບັນທຶກລາຍຈ່າຍ: ' + btn.dataset.cat;
    $('amountInput').value = '';
    $('noteInput').value = '';
    $('overlay').classList.add('show');
    $('amountInput').focus();
  });
});

$('addIncomeBtn').addEventListener('click', () => {
  pendingType = { kind:'income' };
  $('sheetTitle').textContent = 'ບັນທຶກລາຍຮັບ';
  $('amountInput').value = '';
  $('noteInput').value = '';
  $('overlay').classList.add('show');
  $('amountInput').focus();
});

$('addSavingBtn').addEventListener('click', () => {
  pendingType = { kind:'saving' };
  $('sheetTitle').textContent = 'ບັນທຶກເງິນເກັບເພີ່ມ';
  $('amountInput').value = '';
  $('noteInput').value = '';
  $('overlay').classList.add('show');
  $('amountInput').focus();
});

$('cancelBtn').addEventListener('click', () => $('overlay').classList.remove('show'));

$('confirmBtn').addEventListener('click', async () => {
  const amount = Number($('amountInput').value);
  const note = $('noteInput').value;
  if(!amount || amount <= 0){ showToast('ກະລຸນາໃສ່ຈຳນວນເງິນ'); return; }

  let body;
  if(pendingType.kind === 'expense'){
    body = { action:'addExpense', amount, category: pendingType.category, note };
  } else if(pendingType.kind === 'income'){
    body = { action:'addIncome', amount, source:'ຂາຍອອນລາຍ', note };
  } else {
    body = { action:'addSaving', amount, note };
  }

  $('overlay').classList.remove('show');
  showToast('ກຳລັງບັນທຶກ...');
  const res = await apiPost(body);
  if(res && res.success){
    showToast('ບັນທຶກແລ້ວ ✓');
    loadSummary();
  } else {
    showToast('ຜິດພາດ, ລອງໃໝ່');
  }
});

// settings
$('settingsBtn').addEventListener('click', () => {
  $('apiUrlInput').value = API_URL;
  $('settingsOverlay').classList.add('show');
});
$('settingsCancelBtn').addEventListener('click', () => $('settingsOverlay').classList.remove('show'));
$('settingsSaveBtn').addEventListener('click', () => {
  API_URL = $('apiUrlInput').value.trim();
  localStorage.setItem('budgetApiUrl', API_URL);
  $('settingsOverlay').classList.remove('show');
  showToast('ບັນທຶກຄ່າແລ້ວ');
  loadSummary();
});

setDate();
loadSummary();
</script>
</body>
</html>
